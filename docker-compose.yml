# docker-compose.yml — Gradelytics Full Stack
version: "3.9"

services:

  # ── MongoDB ───────────────────────────────
  mongo:
    image: mongo:7
    container_name: gradelytics-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: gradelytics

  # ── Python ML Microservice ────────────────
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: gradelytics-ml
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Node.js Backend ───────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: gradelytics-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - mongo
      - ml-service
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/gradelytics
      - JWT_SECRET=change_this_in_production_please
      - JWT_EXPIRE=7d
      - ML_SERVICE_URL=http://ml-service:8000

  # ── React Frontend ────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: gradelytics-client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server

volumes:
  mongo_data:
